<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শুভ জন্মদিন!</title>
    <style>
        body {
            background-color: #ffe6eb;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            color: #d63384;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 { font-size: 2.5rem; }
        p { font-size: 1.2rem; }
        .btn {
            background-color: #ff477e;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Happy Birthday! 🎂</h1>
        <p>তোমার এই বিশেষ দিনটি অনেক আনন্দে কাটুক।</p>
        <button class="btn" onclick="alert('তোমার জন্য অনেক শুভকামনা ও ভালোবাসা! ❤️')">এখানে ক্লিক করো</button>
    </div>
</body>
</html>
